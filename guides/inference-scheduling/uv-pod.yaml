apiVersion: v1
kind: Pod
metadata:
  name: sleep-uv
  namespace: rob-dev
spec:
  restartPolicy: Never
  containers:
    - name: uv
      image: python:3.12-slim
      command: ["bash","-lc"]
      args:
        - |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends curl ca-certificates
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv --version
          uv venv
          source .venv/bin/activate
          uv pip install lm_eval[api] rust-just transformers
          sleep infinity
      resources:
        requests:
          cpu: "4"
          memory: "8Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      envs:
        HF_TOKEN=
      tty: true
      stdin: true