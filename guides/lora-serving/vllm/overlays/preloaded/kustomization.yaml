apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args/0
        value: |-
          exec vllm serve \
            meta-llama/Llama-3.1-8B-Instruct \
            --port 8000 \
            --enable-lora \
            --lora-modules topic-control=nvidia/llama-3.1-nemoguard-8b-topic-control fact-generation=algoprog/fact-generation-llama-3.1-8b-instruct-lora finance=k0xff/llama-3-8b-sujet-finance-lora \
            --max-loras 3 \
            --max-lora-rank 64 \
            --max-cpu-loras 5
